<div class="product-card" (click)="goToProduct(product.id)">

  <!-- Image area -->
  <div class="product-card__img" [style.background]="product.bg">

    @if (product.badge) {
    <span class="badge" [ngClass]="getBadgeClass(product.badge)">
      {{ product.badge }}
    </span>
    }

    <button class="product-card__wish" (click)="toggleWishlist(product.id, $event)">
      {{ isWishlisted(product.id) ? '❤️' : '🤍' }}
    </button>

    <span class="product-card__emoji">{{ product.image }}</span>
  </div>

  <!-- Info -->
  <div class="product-card__info">
    <span class="product-card__cat">{{ product.category }}</span>
    <h4 class="product-card__name">{{ product.name }}</h4>
    <div class="product-card__rating">
      <span>{{ getStars(product.rating) }}</span>
      <span class="product-card__reviews">({{ product.reviews }})</span>
    </div>
    <div class="product-card__footer">
      <span class="product-card__price">₹{{ product.price }}</span>
      <button class="btn btn--small" [class.btn--added]="isAdded" (click)="addToCart()">
        {{ isAdded ? '✓ Added!' : '+ Cart' }}
      </button>
    </div>
  </div>

</div>
